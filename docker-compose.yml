version: "3.8"

services:
  ppt-generator:
    build: .
    container_name: ppt-ai-generator
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - MIMO_API_KEY=${MIMO_API_KEY:-}
      - MIMO_BASE_URL=${MIMO_BASE_URL:-https://api.mimo.ai/v1}
      - MIMO_MODEL=${MIMO_MODEL:-mimo-v2.5-pro}
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/templates"]
      interval: 30s
      timeout: 5s
      retries: 3
